<?xml version="1.0" encoding="UTF-8"?>
<!-- Sensing stop line task SVG: A3 size (420mm x 297mm)-->
<svg xmlns="http://www.w3.org/2000/svg" width="297mm" height="420mm" viewBox="0 0 297 420" version="1.1">

    <!-- Background (white) -->
    <rect x="0" y="0" width="297" height="420" fill="#FFFFFF" />

    <!-- Start line -->
    <g id="start">
        <rect x="0" y="340" width="297" height="12" fill="#000000" />
        <text x="148.5" y="370" font-size="20" font-family="Arial" text-anchor="middle" dominant-baseline="middle" font-weight="700" fill="#000000">START</text>
    </g>

    <!-- Grey line -->
    <g id="grey">
        <rect x="0" y="120" width="297" height="60" fill="#a6a6a6" />
    </g>

    <!-- Stop line -->
    <g id="stop">
        <rect x="0" y="20" width="297" height="60" fill="#000000" />
        <text x="148.5" y="50" font-size="20" font-family="Arial" text-anchor="middle" dominant-baseline="middle" font-weight="700" fill="#FFFFFF">FINISH</text>
    </g>
</svg>